{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Level Chart</title>
    <link rel="icon" type="image/png" href="{% static 'rtdd/assets/cosppac-icon.png' %}">

    <!-- Google Fonts - Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">

    {% load django_vite %}
    {% vite_hmr_client %}
    {% vite_asset 'js/main.js' %}
</head>

<body class="chart-page-body">
    <div class="container-fluid">
        <div class="page-header">
            <h1 id="station-name">Sea Level Chart</h1>
            <p id="station-metadata"></p>
        </div>
        <div class="chart-container">
            <div id="sea-level-chart" role="region" aria-label="Sea Level Chart"></div>
        </div>
    </div>

</body>
</html>
